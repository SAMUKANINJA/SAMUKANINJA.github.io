<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App · Samuel Vieira</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← Todos os apps</a>

    <div class="hero">
      <img id="icon" class="icon" alt="" width="96" height="96">
      <div class="hero-info">
        <h1 id="name">—</h1>
        <div class="tag" id="tagline"></div>
        <div class="hero-actions">
          <a class="btn" id="download" aria-disabled="true">Baixar</a>
          <span class="req" id="req" style="margin:0"></span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Sobre</h2>
      <p class="desc" id="desc"></p>
      <ul class="chips" id="chips"></ul>
    </div>

    <div class="section">
      <h2>Versões</h2>
      <div id="releases"><div class="loading">Carregando versões…</div></div>
    </div>

    <div class="note">
      <b>Primeira instalação:</b> abra o <code>.dmg</code>, arraste o app para Aplicativos e, ao abrir pela primeira vez,
      clique com o botão direito no app → <b>Abrir</b>. Depois disso, o app se atualiza sozinho.
    </div>

    <footer>
      <a class="link" href="https://github.com/SAMUKANINJA">GitHub</a>
      &nbsp;·&nbsp;
      <a class="link" href="https://www.linkedin.com/in/samuel-vieira-600121214/">LinkedIn</a>
    </footer>
  </div>

  <script src="store.js"></script>
  <script>
    const key = new URLSearchParams(location.search).get("app");
    const app = APPS[key];

    if (!app) {
      location.replace("index.html");
    } else {
      document.title = app.name + " · Samuel Vieira";
      document.getElementById("icon").src = app.icon;
      document.getElementById("icon").alt = "Ícone do " + app.name;
      document.getElementById("name").textContent = app.name;
      document.getElementById("tagline").textContent = app.tagline;
      document.getElementById("desc").textContent = app.description;
      document.getElementById("req").textContent = app.req;

      const chips = document.getElementById("chips");
      app.features.forEach(function (f) {
        const li = document.createElement("li");
        li.textContent = f;
        chips.appendChild(li);
      });

      const dl = document.getElementById("download");
      dl.textContent = "Baixar " + app.name;
      if (app.accent === "cyan") dl.classList.add("cyan");
      wireSmartDownload(dl, app.repo);

      // Version history from the public releases repo.
      const box = document.getElementById("releases");
      fetchReleases(app.repo)
        .then(function (releases) {
          const list = releases.filter(function (r) { return !r.draft; });
          if (!list.length) { box.innerHTML = '<div class="loading">Nenhuma versão publicada ainda.</div>'; return; }
          box.innerHTML = "";
          list.forEach(function (r, i) {
            const dmg = dmgOf(r);
            const el = document.createElement("div");
            el.className = "rel";
            const notes = (r.body || "").trim();
            el.innerHTML =
              '<div class="rel-top">' +
                '<span class="rel-ver">' + (r.tag_name || r.name) + "</span>" +
                (i === 0 ? '<span class="rel-badge">mais recente</span>' : "") +
                '<span class="rel-date">' + formatDate(r.published_at) + "</span>" +
              "</div>" +
              (notes ? '<div class="rel-notes"></div>' : "") +
              (dmg ? '<a class="rel-dl" href="' + dmg.browser_download_url + '">↓ Baixar ' + dmg.name + "</a>" : "");
            if (notes) el.querySelector(".rel-notes").textContent = notes;
            box.appendChild(el);
          });
        })
        .catch(function () {
          box.innerHTML =
            '<div class="loading">Não foi possível carregar as versões agora. ' +
            'Veja as <a class="link" href="https://github.com/' + app.repo + '/releases">releases no GitHub</a>.</div>';
        });
    }
  </script>
</body>
</html>
